<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Média Escolar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Calculadora de Média Escolar</h1>
      <p class="subtitulo">Classificação de médias</p>

      <form>
        <label for="media">Digite a média final:</label>
        <input type="number" id="media" name="media" step="0.1" min="0" max="10" placeholder="Ex: 7.5">

        <button type="submit">Classificar</button>
      </form>

      <div class="resultado">
        <h2>Resultado</h2>
        <p><strong>Média:</strong> 7.5</p>
        <p><strong>Classificação:</strong> Aprovado</p>
      </div>
    </div>
  </div>
</body>
</html>
